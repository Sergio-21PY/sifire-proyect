spring.application.name=ms-reportes
server.port=8082

# -- MySQL: database per service --
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sifire_reportes?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# URLs de observers
ms.alertas.url=${MS_ALERTAS_URL:http://localhost:8084}
ms.monitoreo.url=${MS_MONITOREO_URL:http://localhost:8083}

# Circuit Breaker - Resilience4j
spring.cloud.circuitbreaker.resilience4j.disable-time-limiter=true

resilience4j.circuitbreaker.instances.monitoreoService.sliding-window-size=5
resilience4j.circuitbreaker.instances.monitoreoService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.monitoreoService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.monitoreoService.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.alertasService.sliding-window-size=5
resilience4j.circuitbreaker.instances.alertasService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.alertasService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.alertasService.wait-duration-in-open-state=10s