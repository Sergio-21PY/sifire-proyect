spring.application.name=ms-monitoreo
server.port=8080

# -- MySQL --
spring.datasource.url=jdbc:mysql://localhost:3306/sifire?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -- Desactiva Eureka --
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# -- URLs de otros microservicios (Feign clients) --
# En local: apuntan a localhost
# En Docker: se sobreescriben con variables de entorno del docker-compose
ms.alertas.url=http://localhost:8084
ms.reportes.url=http://localhost:8082
ms.usuarios.url=http://localhost:8081