spring.application.name=ms-monitoreo
server.port=8083

# -- MySQL: database per service --
spring.datasource.url=jdbc:mysql://localhost:3306/sifire_monitoreo?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# URLs Feign clients
ms.alertas.url=http://localhost:8084
ms.reportes.url=http://localhost:8082
ms.usuarios.url=http://localhost:8081
