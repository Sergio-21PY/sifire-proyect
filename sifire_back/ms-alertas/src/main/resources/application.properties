spring.application.name=ms-alertas
server.port=8084

# -- MySQL (XAMPP / Docker) --
spring.datasource.url=jdbc:mysql://localhost:3306/sifire_alertas?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# URL Feign client para asignar brigadistas
ms-usuarios.url=http://localhost:8081
