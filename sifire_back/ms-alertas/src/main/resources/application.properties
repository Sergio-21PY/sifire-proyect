spring.application.name=ms-alertas
server.port=8084

# -- MySQL: database per service --
spring.datasource.url=jdbc:mysql://localhost:3306/sifire_alertas?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# URL Feign client para consultar brigadistas (formato Ribbon)
ms-usuarios.ribbon.listOfServers=http://localhost:8081

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- Configuracion de Resilience4j Circuit Breaker ---
resilience4j.circuitbreaker.instances.ms-usuarios.register-health-indicator=true
# -- Observa las ultimas 10 llamadas --
resilience4j.circuitbreaker.instances.ms-usuarios.sliding-window-size=10
# -- Si el 50% de las llamadas fallan --
resilience4j.circuitbreaker.instances.ms-usuarios.failure-rate-threshold=50
#-- Tiempo de espera para no molestar al usuario --
resilience4j.circuitbreaker.instances.ms-usuarios.wait-duration-in-open-state=10s
#-- Cantidad de pruebas que dejara pasar antes de abrir el Circuit breaker. --
resilience4j.circuitbreaker.instances.ms-usuarios.permitted-number-of-calls-in-half-open-state=3

spring.flyway.out-of-order=true
