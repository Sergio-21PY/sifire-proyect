spring.application.name=ms-alertas
server.port=8080 # El puerto interno del contenedor

# La configuración de la base de datos (URL, user, pass) se inyectará desde docker-compose.yml
# La URL del cliente Feign (ms-usuarios.url) se inyectará desde docker-compose.yml

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desactiva Eureka en este perfil
eureka.client.enabled=false
