spring.application.name=ms-alertas
server.port=8084

# -- MySQL: database per service --
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sifire_alertas?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# URL Feign client para consultar brigadistas (formato Ribbon)
ms-usuarios.ribbon.listOfServers=${MS_USUARIOS_RIBBON_LISTOFSERVERS:http://localhost:8081}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- Configuracion de Resilience4j Circuit Breaker ---
resilience4j.circuitbreaker.instances.ms-usuarios.register-health-indicator=true
resilience4j.circuitbreaker.instances.ms-usuarios.sliding-window-size=10
resilience4j.circuitbreaker.instances.ms-usuarios.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ms-usuarios.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ms-usuarios.permitted-number-of-calls-in-half-open-state=3